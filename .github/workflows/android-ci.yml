name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_COMPILE_SDK: "36"
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g

jobs:
  build:
    name: Check, test, and build debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Verify Android project bootstrap
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -f gradlew ]] || missing+=("gradlew")
          [[ -f gradlew.bat ]] || missing+=("gradlew.bat")
          [[ -f gradle/wrapper/gradle-wrapper.jar ]] || missing+=("gradle/wrapper/gradle-wrapper.jar")
          [[ -f gradle/wrapper/gradle-wrapper.properties ]] || missing+=("gradle/wrapper/gradle-wrapper.properties")
          [[ -f settings.gradle.kts ]] || missing+=("settings.gradle.kts")
          [[ -f build.gradle.kts ]] || missing+=("build.gradle.kts")
          [[ -f gradle/libs.versions.toml ]] || missing+=("gradle/libs.versions.toml")
          [[ -f app/build.gradle.kts ]] || missing+=("app/build.gradle.kts")

          if (( ${#missing[@]} > 0 )); then
            for path in "${missing[@]}"; do
              echo "::error title=Android project is not bootstrapped::Missing required path: ${path}"
            done
            echo "Import/bootstrap the Android Gradle project described in README.md and docs/IMPLEMENTATION_PLAN.md before CI can build an APK."
            exit 1
          fi

          chmod +x gradlew

      - name: Reject production Android WebView references
        shell: bash
        run: |
          set -euo pipefail

          roots=(app)
          for root in core engine feature design-system; do
            [[ -d "${root}" ]] && roots+=("${root}")
          done

          if grep -R -n -E \
            --include='*.java' \
            --include='*.kt' \
            --exclude-dir=build \
            --exclude-dir=test \
            --exclude-dir=androidTest \
            'android[.]webkit[.]WebView' "${roots[@]}"; then
            echo "::error title=Forbidden production engine::mixi-bro production sources must not reference android.webkit.WebView."
            exit 1
          fi

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4

      - name: Set up Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android platform
        shell: bash
        run: sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run quality checks and build debug APK
        shell: bash
        run: ./gradlew --no-daemon --stacktrace spotlessCheck lint test :app:assembleDebug

      - name: Upload test and lint reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-ci-reports-${{ github.run_id }}
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mixi-bro-debug-${{ github.sha }}
          path: "app/build/outputs/apk/**/debug/*.apk"
          if-no-files-found: error
          retention-days: 14
